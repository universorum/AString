name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (${{ matrix.framework }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: netcoreapp2.0
            runs-on: ubuntu-20.04
            runtime-dotnet: '2.0.x'
          - framework: netcoreapp3.0
            runs-on: ubuntu-20.04
            runtime-dotnet: '3.0.x'
          - framework: net8.0
            runs-on: ubuntu-latest
            runtime-dotnet: '8.x'
          - framework: net10.0
            runs-on: ubuntu-latest
            runtime-dotnet: '10.x'
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET (build SDK)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Setup .NET (test runtime)
        if: matrix.runtime-dotnet != '10.x'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.runtime-dotnet }}
      - name: Restore
        run: dotnet restore tests/AString.Tests/AString.Tests.csproj
      - name: Test
        run: >
          dotnet test tests/AString.Tests/AString.Tests.csproj
          --configuration Release
          --framework ${{ matrix.framework }}
          --verbosity normal

  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Pack
        run: >
          dotnet pack AString/AString.csproj
          --no-build
          --configuration Release
          --output ./nupkg
      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: ./nupkg/
          retention-days: 1
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, pack]
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: package
          path: ./nupkg/
      - name: Push to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate